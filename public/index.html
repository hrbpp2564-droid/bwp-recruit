<style>
/* ============================================================
   BWP Recruitment Management System — Design Tokens & Globals
   Theme: Modern Industrial Corporate — Navy / White / Silver
   ============================================================ */

:root {
  --navy-900: #0b1f3a;
  --navy-800: #0f2747;
  --navy-700: #16335c;
  --navy-600: #1d3f70;
  --navy-500: #2a5288;

  --accent: #2f6fd6;
  --accent-soft: #e8f0fc;
  --accent-700: #2257ad;

  --bg: #eef1f5;
  --bg-soft: #f5f7fa;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --line: #e3e8ef;
  --line-strong: #d2dae4;

  --ink: #16202e;
  --ink-2: #44505f;
  --ink-3: #6b7686;
  --ink-on-navy: #eaf0f8;
  --ink-on-navy-dim: #9db0cc;

  --green: #1f9d63;
  --green-soft: #e3f5ec;
  --amber: #d98a16;
  --amber-soft: #fbf0db;
  --red: #d6453d;
  --red-soft: #fbe6e5;
  --violet: #6b4fd1;
  --violet-soft: #ece7fb;
  --teal: #128a9c;
  --teal-soft: #def0f3;

  --r-sm: 6px;
  --r: 10px;
  --r-lg: 14px;
  --r-xl: 20px;

  --shadow-xs: 0 1px 2px rgba(15,39,71,0.06);
  --shadow-sm: 0 1px 3px rgba(15,39,71,0.08), 0 1px 2px rgba(15,39,71,0.04);
  --shadow: 0 4px 16px rgba(15,39,71,0.08), 0 1px 3px rgba(15,39,71,0.05);
  --shadow-lg: 0 18px 48px rgba(11,31,58,0.22);

  --sidebar-w: 256px;
  --topbar-h: 62px;

  --font: "IBM Plex Sans Thai", "IBM Plex Sans", system-ui, -apple-system, sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { min-height: 100vh; }

button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #c4cdd9; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: #aab6c6; background-clip: padding-box; }
::-webkit-scrollbar-track { background: transparent; }

.tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
.mono { font-family: var(--mono); }

.eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink-3);
}

.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}
.app.mobile-mode { grid-template-columns: 1fr; }

.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
}

.focusable:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

@keyframes fadeUp { from { transform: translateY(7px); } to { transform: none; } }
@keyframes fadeIn { from { opacity: .85; } to { opacity: 1; } }
@keyframes scaleIn { from { transform: scale(.98); } to { transform: none; } }
.anim-fade { animation: fadeIn .25s ease; }
.anim-up { animation: fadeUp .35s cubic-bezier(.2,.7,.3,1); }

.noscroll::-webkit-scrollbar { height: 8px; }

.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 999px;
  font-size: 12px; font-weight: 600; line-height: 1.5;
}

table.dt { width: 100%; border-collapse: collapse; }
table.dt th {
  text-align: left; font-size: 11.5px; font-weight: 600; letter-spacing: .03em;
  color: var(--ink-3); text-transform: uppercase;
  padding: 11px 14px; border-bottom: 1px solid var(--line);
  background: var(--surface-2); position: sticky; top: 0;
}
table.dt td { padding: 13px 14px; border-bottom: 1px solid var(--line); font-size: 13.5px; color: var(--ink-2); }
table.dt tbody tr { transition: background .12s; }
table.dt tbody tr:hover { background: var(--surface-2); }
table.dt tbody tr:last-child td { border-bottom: none; }

main { container-type: inline-size; }
@container (max-width: 760px) {
  .dash-grid { grid-template-columns: 1fr !important; }
}
@media (max-width: 760px) {
  .dash-grid { grid-template-columns: 1fr !important; }
}
</style>

    line:        <><rect x="3" y="4" width="18" height="14" rx="4" {...p}/><path d="M7 9v4M7 9l3 4V9M13 9v4h2.5M18 9v4M18 9h-2" {...p}/><path d="M9 18l-1.5 3 4-3" {...p}/></>,
    award:       <><circle cx="12" cy="9" r="5" {...p}/><path d="M9 13l-1.5 7 4.5-3 4.5 3L15 13" {...p}/></>,
    layers:      <><path d="M12 3l9 5-9 5-9-5Z" {...p}/><path d="M3 13l9 5 9-5M3 16.5l9 5 9-5" {...p}/></>,
  };
  return (
    <svg viewBox="0 0 24 24" width={size} height={size} style={style} className={className} aria-hidden="true">
      {paths[name] || null}
    </svg>
  );
};

const LineChart = ({ data, height = 190, color = "var(--accent)", valueKey = "v", labelKey = "m" }) => {
  const w = 560, pad = 10;
  const vals = data.map(d => d[valueKey]);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const stepX = (w - pad * 2) / (data.length - 1);
  const pts = data.map((d, i) => [pad + i * stepX, height - pad - ((d[valueKey] - min) / range) * (height - pad * 2 - 18)]);
  const path = pts.map((p, i) => i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`).join(" ");
  const area = `${path} L${pts[pts.length - 1][0]},${height} L${pts[0][0]},${height} Z`;
  return (
    <div>
      <svg viewBox={`0 0 ${w} ${height}`} style={{ width: "100%", height }} preserveAspectRatio="none">
        <defs>
          <linearGradient id="lc-fill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.18" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0.25, 0.5, 0.75].map(g => <line key={g} x1={pad} x2={w - pad} y1={height * g} y2={height * g} stroke="#eef1f5" strokeWidth="1" />)}
        <path d={area} fill="url(#lc-fill)" />
        <path d={path} fill="none" stroke={color} strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round" />
        {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3.2" fill="#fff" stroke={color} strokeWidth="2" />)}
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", padding: "0 6px", marginTop: 2 }}>
        {data.map((d, i) => <span key={i} style={{ fontSize: 10.5, color: "var(--ink-3)" }}>{d[labelKey]}</span>)}
      </div>
    </div>
  );
};

const Funnel = ({ data }) => {

};

const RoleSwitcher = ({ role, setRole }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h);
  }, []);
  const cur = BWP.roles.find(r => r.id === role);
  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button onClick={() => setOpen(o => !o)} className="focusable" style={{ display: "flex", alignItems: "center", gap: 10, padding: "5px 9px 5px 6px", borderRadius: 10, border: "1px solid var(--line)", background: "var(--surface)", cursor: "pointer" }}>

        <div style={{ textAlign: "left", lineHeight: 1.25 }}>
          <div style={{ fontSize: 12.5, fontWeight: 700, color: "var(--ink)", whiteSpace: "nowrap" }}>{cur.person}</div>
          <div style={{ fontSize: 11, color: "var(--ink-3)", whiteSpace: "nowrap" }}>{cur.th}</div>
        </div>
        <Icon name="chevronDown" size={15} style={{ color: "var(--ink-3)" }} />
      </button>
      {open && (
        <div className="anim-up" style={{ position: "absolute", right: 0, top: "calc(100% + 8px)", width: 290, background: "var(--surface)", borderRadius: 13, boxShadow: "var(--shadow-lg)", border: "1px solid var(--line)", padding: 8, zIndex: 120 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "var(--ink-3)", padding: "6px 10px 8px", textTransform: "uppercase", letterSpacing: ".06em" }}>สลับมุมมองบทบาท (RBAC)</div>
          {BWP.roles.map(r => (
            <button key={r.id} onClick={() => { setRole(r.id); setOpen(false); }} className="focusable" style={{
              width: "100%", display: "flex", alignItems: "center", gap: 11, padding: "8px 10px", borderRadius: 9,
              border: "none", background: r.id === role ? "var(--accent-soft)" : "transparent", cursor: "pointer", textAlign: "left", marginBottom: 1,
            }}
              onMouseEnter={e => { if (r.id !== role) e.currentTarget.style.background = "var(--surface-2)"; }}
              onMouseLeave={e => { if (r.id !== role) e.currentTarget.style.background = "transparent"; }}>
              <Avatar initials={r.initials} color={r.color} size={32} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "var(--ink)" }}>{r.person}</div>

};

const ApprovalFlow = ({ status }) => {
  const order = ["draft", "pending_hr", "pending_dir", "approved"];
  const steps = [{ key: "draft", label: "ผู้จัดการแผนก", sub: "สร้างคำขอ", icon: "doc" },{ key: "pending_hr", label: "HR Manager", sub: "ตรวจสอบ", icon: "users" },{ key: "pending_dir", label: "กรรมการผู้จัดการ", sub: "อนุมัติ", icon: "award" },{ key: "approved", label: "เปิดรับสมัคร", sub: "Open Position", icon: "check" }];
  const rejected = status === "rejected";
  const curIdx = status === "closed" ? 4 : order.indexOf(status);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 0, flexWrap: "wrap" }}>
      {steps.map((s, i) => {
        const done = i < curIdx || status === "approved" || status === "closed";
        const active = i === curIdx && !rejected;
        const isRej = rejected && i === curIdx;
        const c = isRej ? "var(--red)" : done ? "var(--green)" : active ? "var(--accent)" : "var(--ink-3)";
        const bg = isRej ? "var(--red-soft)" : done ? "var(--green-soft)" : active ? "var(--accent-soft)" : "var(--surface-2)";
        return (
          <React.Fragment key={s.key}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, minWidth: 90 }}>
              <div style={{ width: 42, height: 42, borderRadius: 12, background: bg, color: c, display: "grid", placeItems: "center", border: `1.5px solid ${active || isRej ? c : "transparent"}` }}><Icon name={isRej ? "x" : done ? "check" : s.icon} size={20} /></div>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: active || done ? "var(--ink)" : "var(--ink-3)" }}>{s.label}</div>
                <div style={{ fontSize: 10.5, color: "var(--ink-3)" }}>{s.sub}</div>
              </div>
            </div>
            {i < steps.length - 1 && <div style={{ flex: 1, height: 2, minWidth: 24, background: i < curIdx ? "var(--green)" : "var(--line-strong)", marginTop: -24 }} />}
          </React.Fragment>
        );
      })}
    </div>
  );
};

          <Field label="สาเหตุการเปิด" half><Select options={["ทดแทน", "ขยายกำลังคน", "โครงการใหม่"]} /></Field>

const PipelineModule = ({ onOpenCandidate }) => {
  const [cards, setCards] = useState(() => BWP.candidates.map(c => ({ ...c })));
  const [drag, setDrag] = useState(null);
  const [over, setOver] = useState(null);
  const move = (stageId) => { if (!drag) return; setCards(cs => cs.map(c => c.id === drag ? { ...c, stage: stageId } : c)); setDrag(null); setOver(null); };
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12, marginBottom: 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: "var(--ink-3)" }}>
          <Icon name="board" size={17} style={{ color: "var(--accent)" }} />
          ลากการ์ดเพื่อเปลี่ยนสถานะ · ผู้สมัครทั้งหมด <b className="tnum" style={{ color: "var(--ink)" }}>{cards.length}</b> คน
        </div>
        <div style={{ display: "flex", gap: 8 }}><Btn variant="ghost" size="sm" icon="filter">ตัวกรอง</Btn><Btn variant="accent" size="sm" icon="plus">เพิ่มผู้สมัคร</Btn></div>
      </div>
      <div style={{ display: "flex", gap: 12, overflowX: "auto", paddingBottom: 14 }} className="noscroll">
        {BWP.stages.map(stage => {
          const items = cards.filter(c => c.stage === stage.id);
          const isOver = over === stage.id;
          return (
            <div key={stage.id} onDragOver={e => { e.preventDefault(); setOver(stage.id); }} onDragLeave={() => setOver(o => o === stage.id ? null : o)} onDrop={() => move(stage.id)}
              style={{ width: 248, flexShrink: 0, background: isOver ? "var(--accent-soft)" : "var(--bg-soft)", border: `1.5px solid ${isOver ? "var(--accent)" : "var(--line)"}`, borderRadius: 13, padding: 10, transition: "all .15s", display: "flex", flexDirection: "column" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "4px 6px 12px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ width: 9, height: 9, borderRadius: 3, background: stage.color }} />
                  <span style={{ fontSize: 12.5, fontWeight: 700, color: "var(--ink)" }}>{stage.th}</span>
                </div>
                <span className="tnum" style={{ fontSize: 11.5, fontWeight: 700, color: "var(--ink-3)", background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 99, minWidth: 22, textAlign: "center", padding: "1px 6px" }}>{items.length}</span>
              </div>
              <div style={{ flex: 1, minHeight: 60 }}>
                {items.map(c => (<CandidateCard key={c.id} c={c} dragging={drag === c.id} onDragStart={() => setDrag(c.id)} onDragEnd={() => { setDrag(null); setOver(null); }} onClick={() => onOpenCandidate(c)} />))}
                {!items.length && <div style={{ textAlign: "center", padding: "18px 0", fontSize: 11.5, color: "var(--ink-3)", border: "1.5px dashed var(--line-strong)", borderRadius: 9 }}>วางการ์ดที่นี่</div>}
              </div>
            </div>
          );
        })}
        <div style={{ width: 200, flexShrink: 0, background: "var(--red-soft)", border: "1.5px solid #f0c9c7", borderRadius: 13, padding: 10 }}
          onDragOver={e => { e.preventDefault(); setOver("rejected"); }} onDrop={() => move("rejected")}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 6px 12px" }}><Icon name="x" size={14} style={{ color: "var(--red)" }} /><span style={{ fontSize: 12.5, fontWeight: 700, color: "var(--red)" }}>ไม่ผ่าน / ปฏิเสธ</span></div>
          <div style={{ minHeight: 60 }}>
            {cards.filter(c => c.stage === "rejected").map(c => (<CandidateCard key={c.id} c={c} dragging={drag === c.id} onDragStart={() => setDrag(c.id)} onDragEnd={() => setDrag(null)} onClick={() => onOpenCandidate(c)} />))}
            {!cards.filter(c => c.stage === "rejected").length && <div style={{ textAlign: "center", padding: "18px 0", fontSize: 11.5, color: "#c98b87" }}>—</div>}
          </div>
        </div>
      </div>
    </div>
  );
};

const ApprovalFlowOffer = ({ status }) => {
  const steps = [["HR จัดทำ", "doc"], ["กรรมการผู้จัดการ", "award"], ["ส่งผู้สมัคร", "mail"], ["ตอบรับ", "check"]];
  const map = { draft: 0, pending_dir: 1, sent: 2, accepted: 3 };
  const cur = map[status] ?? 0;
  return (
    <div style={{ display: "flex", alignItems: "center" }}>

        const done = i <= cur, active = i === cur;
        const c = done ? "var(--green)" : "var(--ink-3)";

          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5, minWidth: 80 }}>

          {i < steps.length - 1 && <div style={{ flex: 1, height: 2, background: i < cur ? "var(--green)" : "var(--line-strong)", marginTop: -20 }} />}

};

const OnboardingModule = ({ pushToast }) => {
  const [active, setActive] = useState(0);

  const done = tasks.filter(t => t.done).length;
  const pct = Math.round((done / tasks.length) * 100);
  const groups = [...new Set(tasks.map(t => t.group))];
  const person = BWP.onboarding[active];
  return (

              <div style={{ fontSize: 11, color: "var(--ink-3)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", marginBottom: 5 }}>{p.pos}</div>
              <Bar value={ppct} color={ppct === 100 ? "var(--green)" : "var(--accent)"} height={5} />
            </div>
            <span className="tnum" style={{ fontSize: 12, fontWeight: 700, color: ppct === 100 ? "var(--green)" : "var(--ink-2)" }}>{ppct}%</span>

          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>

              <Pill color="var(--teal)" bg="var(--teal-soft)" style={{ marginTop: 5 }}>ส่งต่อระบบประเมินทดลองงาน</Pill>

const LoginPage = ({ onLogin }) => {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [showPw, setShowPw] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'เข้าสู่ระบบไม่สำเร็จ');
      localStorage.setItem('bwp_token', data.token);
      localStorage.setItem('bwp_user', JSON.stringify(data.user));
      onLogin(data.user);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, var(--navy-900) 0%, #132f55 50%, var(--navy-800) 100%)', display: 'grid', placeItems: 'center', padding: 20 }}>

      </div>
      <div className="anim-up" style={{ width: 420, maxWidth: '100%', position: 'relative', zIndex: 1 }}>
        <div style={{ textAlign: 'center', marginBottom: 32 }}>
          <div style={{ width: 64, height: 64, borderRadius: 18, background: 'linear-gradient(135deg,#2f6fd6,#1d3f70)', display: 'grid', placeItems: 'center', margin: '0 auto 16px', boxShadow: '0 8px 32px rgba(47,111,214,.4)' }}>
            <span style={{ fontWeight: 800, fontSize: 26, color: '#fff', letterSpacing: '-.02em' }}>BW</span>
          </div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: '#fff', margin: '0 0 6px', letterSpacing: '-.01em' }}>BWP Recruit</h1>
          <p style={{ fontSize: 14, color: 'var(--ink-on-navy-dim)', margin: 0 }}>ระบบบริหารงานสรรหา — เข้าสู่ระบบ</p>
        </div>

        <form onSubmit={handleSubmit} style={{ background: 'var(--surface)', borderRadius: 20, padding: '32px 28px', boxShadow: '0 24px 64px rgba(0,0,0,.25)' }}>

            <div className="anim-fade" style={{ background: 'var(--red-soft)', border: '1px solid #f0c9c7', borderRadius: 10, padding: '10px 14px', marginBottom: 18, display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icon name="alert" size={18} style={{ color: 'var(--red)', flexShrink: 0 }} />
              <span style={{ fontSize: 13, color: 'var(--red)', fontWeight: 600 }}>{error}</span>
            </div>
          )}

          <div style={{ marginBottom: 18 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--ink-2)', marginBottom: 7 }}>ชื่อผู้ใช้ (Username)</label>

                style={{ ...inputStyle, paddingLeft: 40, paddingRight: 42 }}
                onFocus={e => e.target.style.borderColor = 'var(--accent)'} onBlur={e => e.target.style.borderColor = 'var(--line-strong)'} />
              <button type="button" onClick={() => setShowPw(v => !v)} style={{ position: 'absolute', right: 4, top: '50%', transform: 'translateY(-50%)', width: 34, height: 34, borderRadius: 8, border: 'none', background: 'transparent', color: 'var(--ink-3)', cursor: 'pointer', display: 'grid', placeItems: 'center' }}>
                <Icon name={showPw ? 'x' : 'eye'} size={17} />
              </button>
            </div>
          </div>

          <button type="submit" disabled={loading} className="focusable"
            style={{ width: '100%', padding: '12px 20px', borderRadius: 12, border: 'none', background: loading ? 'var(--ink-3)' : 'linear-gradient(135deg, var(--navy-800), var(--accent-700))', color: '#fff', fontSize: 15, fontWeight: 700, cursor: loading ? 'wait' : 'pointer', transition: 'all .2s', boxShadow: '0 4px 16px rgba(47,111,214,.3)' }}
            onMouseEnter={e => { if (!loading) { e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(47,111,214,.4)'; } }}
            onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = '0 4px 16px rgba(47,111,214,.3)'; }}>
            {loading ? 'กำลังเข้าสู่ระบบ…' : 'เข้าสู่ระบบ'}
          </button>
        </form>

        <div style={{ marginTop: 24, background: 'rgba(255,255,255,.06)', borderRadius: 14, padding: '16px 20px', border: '1px solid rgba(255,255,255,.08)' }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink-on-navy-dim)', marginBottom: 10, letterSpacing: '.04em' }}>บัญชีสำหรับทดสอบ</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px 16px' }}>
            {[
              ['admin', 'BWPadmin@2569', 'ผู้ดูแลระบบ'],
              ['hr.manager', 'HRm@2569', 'ผจก.ฝ่ายบุคคล'],
              ['hr.officer', 'HRo@2569', 'จนท.สรรหา'],
              ['dept.manager', 'DEPm@2569', 'ผจก.แผนก'],
              ['interviewer', 'IVw@2569', 'ผู้สัมภาษณ์'],
              ['md', 'MD@2569', 'กรรมการผู้จัดการ'],
            ].map(([u, p, label]) => (
              <button key={u} type="button" onClick={() => { setUsername(u); setPassword(p); setError(''); }}
                style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', borderRadius: 8, border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', textAlign: 'left', fontSize: 12, transition: 'background .15s' }}
                onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,.08)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <span style={{ fontFamily: 'var(--mono)', color: 'var(--accent)', fontWeight: 600 }}>{u}</span>
                <span style={{ color: 'var(--ink-on-navy-dim)', fontSize: 11 }}>{label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ============================================================
   Change Password Modal
   ============================================================ */
const ChangePasswordModal = ({ open, onClose, pushToast }) => {
  const [current, setCurrent] = useState('');
  const [newPw, setNewPw] = useState('');
  const [confirm, setConfirm] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    if (newPw.length < 6) return setError('รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร');
    if (newPw !== confirm) return setError('รหัสผ่านใหม่ไม่ตรงกัน');
    setLoading(true);
    try {
      const token = localStorage.getItem('bwp_token');
      const res = await fetch('/api/auth/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ current_password: current, new_password: newPw }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      pushToast('เปลี่ยนรหัสผ่านสำเร็จ');
      setCurrent(''); setNewPw(''); setConfirm('');
      onClose();
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <Modal open={open} onClose={onClose} title="เปลี่ยนรหัสผ่าน" icon="settings" width={440}>
      <form onSubmit={handleSubmit}>
        {error && <div style={{ background: 'var(--red-soft)', border: '1px solid #f0c9c7', borderRadius: 8, padding: '8px 12px', marginBottom: 14, fontSize: 13, color: 'var(--red)', fontWeight: 600 }}>{error}</div>}
        <Field label="รหัสผ่านปัจจุบัน" required>
          <TextInput type="password" value={current} onChange={e => setCurrent(e.target.value)} />
        </Field>
        <div style={{ height: 12 }} />
        <Field label="รหัสผ่านใหม่ (อย่างน้อย 6 ตัวอักษร)" required>
          <TextInput type="password" value={newPw} onChange={e => setNewPw(e.target.value)} />
        </Field>
        <div style={{ height: 12 }} />
        <Field label="ยืนยันรหัสผ่านใหม่" required>
          <TextInput type="password" value={confirm} onChange={e => setConfirm(e.target.value)} />
        </Field>
        <div style={{ marginTop: 20, display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
          <Btn variant="ghost" onClick={onClose}>ยกเลิก</Btn>
          <Btn variant="accent" type="submit" icon="check">{loading ? 'กำลังบันทึก…' : 'บันทึก'}</Btn>
        </div>
      </form>
    </Modal>
  );
};

const App = () => {
  const [authUser, setAuthUser] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [role, setRole] = useState("hr_manager");
  const [active, setActive] = useState("dashboard");
  const [device, setDevice] = useState("desktop");
  const [drawer, setDrawer] = useState(false);
  const [candidate, setCandidate] = useState(null);
  const [toast, setToast] = useState(null);
  const [showChangePw, setShowChangePw] = useState(false);

  const allowed = useMemo(() => {
    if (!BWP_READY) return [];
    return Object.keys(BWP.permissions || {}).filter(m => (BWP.permissions[m] || []).includes(role));
  }, [role]);

  useEffect(() => {
    const token = localStorage.getItem('bwp_token');
    if (!token) { setAuthChecked(true); return; }
    fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(user => {
        setAuthUser(user);
        setRole(user.role_id);
        setAuthChecked(true);
      })
      .catch(() => {
        localStorage.removeItem('bwp_token');
        localStorage.removeItem('bwp_user');
        setAuthChecked(true);
      });
  }, []);

  useEffect(() => { if (allowed.length && !allowed.includes(active)) setActive("dashboard"); }, [role, allowed]);

  const handleLogin = (user) => {
    setAuthUser(user);
    setRole(user.role_id);
    setActive("dashboard");
  };

  const handleLogout = async () => {
    const token = localStorage.getItem('bwp_token');
    if (token) await fetch('/api/auth/logout', { method: 'POST', headers: { Authorization: 'Bearer ' + token } }).catch(() => {});
    localStorage.removeItem('bwp_token');
    localStorage.removeItem('bwp_user');
    setAuthUser(null);
  };

  const pushToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2800); };
  const goto = (id) => { setActive(id); setDrawer(false); };
  const mobile = device === "mobile";

  if (!authChecked) return (
    <div style={{ minHeight: '100vh', display: 'grid', placeItems: 'center', background: 'var(--bg)' }}>
      <div style={{ textAlign: 'center', color: 'var(--ink-3)' }}>
        <div style={{ width: 48, height: 48, borderRadius: 13, background: 'linear-gradient(135deg,#2f6fd6,#1d3f70)', display: 'grid', placeItems: 'center', margin: '0 auto 14px', color: '#fff', fontWeight: 800, fontSize: 19 }}>BW</div>
        กำลังตรวจสอบสิทธิ์…
      </div>
    </div>
  );

  if (!authUser) return <LoginPage onLogin={handleLogin} />;

  const shell = (
    <div className={"app" + (mobile ? " mobile-mode" : "")} style={{ position: "relative" }}>
      {!mobile && <div style={{ position: "sticky", top: 0, height: "100vh" }}><Sidebar active={active} setActive={setActive} role={role} allowed={allowed} onNav={goto} /></div>}
      {mobile && drawer && (
        <div style={{ position: "absolute", inset: 0, zIndex: 150 }}>
          <div onClick={() => setDrawer(false)} style={{ position: "absolute", inset: 0, background: "rgba(11,31,58,.5)" }} className="anim-fade" />
          <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: "var(--sidebar-w)", boxShadow: "var(--shadow-lg)" }} className="anim-fade">
            <Sidebar active={active} setActive={setActive} role={role} allowed={allowed} onNav={goto} mobile />
          </div>
        </div>
      )}
      <div style={{ minWidth: 0, display: "flex", flexDirection: "column" }}>
        <Topbar active={active} role={role} setRole={setRole} mobile={mobile} onMenu={() => setDrawer(true)}
          deviceToggle={!mobile && <DeviceToggle device={device} setDevice={setDevice} />}
          notifClick={() => goto("notifications")} notifCount={2}
          authUser={authUser} onLogout={handleLogout} onChangePw={() => setShowChangePw(true)} />
        {mobile && (
          <div style={{ padding: "10px 14px", borderBottom: "1px solid var(--line)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface)" }}>
            <RoleSwitcher role={role} setRole={setRole} />
            <DeviceToggle device={device} setDevice={setDevice} />
          </div>
        )}
        <main key={active} className="anim-fade" style={{ padding: mobile ? "16px 14px 40px" : "24px 26px 48px", flex: 1 }}>
          <ModuleRenderer active={active} role={role} goto={goto} openCandidate={setCandidate} pushToast={pushToast} />
        </main>
      </div>
      <CandidateDetail c={candidate} onClose={() => setCandidate(null)} />
      <ChangePasswordModal open={showChangePw} onClose={() => setShowChangePw(false)} pushToast={pushToast} />
      {toast && <Toast msg={toast} />}
    </div>
  );

  if (mobile) {
    return (
      <div style={{ minHeight: "100vh", background: "radial-gradient(circle at 50% 0%, #1a3358, var(--navy-900))", display: "grid", placeItems: "center", padding: "28px 16px" }}>
        <div style={{ width: 390, maxWidth: "100%", height: 800, maxHeight: "92vh", background: "var(--bg)", borderRadius: 40, overflow: "hidden", boxShadow: "0 40px 90px rgba(0,0,0,.5), 0 0 0 11px #0a1526, 0 0 0 13px #223450", position: "relative" }}>
          <div style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", width: 130, height: 26, background: "#0a1526", borderRadius: "0 0 16px 16px", zIndex: 100 }} />
          <div style={{ height: "100%", overflowY: "auto", position: "relative" }}>{shell}</div>
        </div>
      </div>
    );
  }
  return shell;
};

// Boot: load data from API, then render
loadBWP().then(() => {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
});
</script>
</body>
</html>
